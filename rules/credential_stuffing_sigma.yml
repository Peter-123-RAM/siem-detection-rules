title: Fintech Credential Stuffing Detection

id: fintech-001

status: experimental

description:
  Detects multiple failed authentication attempts from one source IP indicating credential stuffing attacks.

author:
  SIEM Engineer

logsource:
  category: authentication

detection:

  selection:
    event_type: login_failure

  timeframe:
    5m

  condition:
    selection | count(source_ip) > 20


level:
  high


tags:
  - attack.t1110.003
  - credential-access
