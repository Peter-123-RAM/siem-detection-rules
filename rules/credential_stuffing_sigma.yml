title: Credential Stuffing Against Multiple Users

id: fintech-credential-stuffing-002

status: experimental

description:
 Detects credential stuffing where one source IP attempts authentication against many different users.

author:
 SIEM Engineer


logsource:

 product: windows
 service: security


detection:


 selection:

  EventID: 4625

  Status: "0xC000006A"



 condition:

  selection | count(distinct TargetUserName) > 10 by IpAddress



 timeframe:

  5m



level:

 high



tags:

 - attack.t1110.004
